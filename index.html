<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI 背单词 · 译林版小学英语</title>
<style>
  :root {
    --bg1: #6a8dff;
    --bg2: #9b7bff;
    --card: #ffffff;
    --accent: #ff8a5b;
    --green: #35c98a;
    --red: #ff6b6b;
    --text: #2b2d42;
    --muted: #8a8fa3;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
    background: linear-gradient(135deg, var(--bg1), var(--bg2));
    min-height: 100vh;
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }
  header { text-align: center; color: #fff; margin: 6px 0 14px; }
  header h1 { font-size: 26px; letter-spacing: 1px; }
  header p { opacity: .9; margin-top: 6px; font-size: 14px; }

  .streak {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,.2); color:#fff;
    padding: 6px 16px; border-radius: 999px; margin-top: 10px; font-size: 14px;
  }
  .streak b { font-size: 18px; }

  .tabs {
    display: flex; gap: 6px; flex-wrap: wrap; justify-content: center;
    background: rgba(255,255,255,.2); padding: 6px; border-radius: 18px; margin-bottom: 14px;
  }
  .tabs button {
    border: none; background: transparent; color: #fff;
    padding: 8px 14px; border-radius: 12px; font-size: 15px; cursor: pointer; transition: .2s;
  }
  .tabs button.active { background: #fff; color: var(--bg1); font-weight: 600; }

  .book-picker { margin-bottom: 16px; }
  .speed, .book-picker label { color: #fff; font-size: 14px; display: flex; align-items: center; gap: 6px; }
  select { border: none; border-radius: 10px; padding: 6px 10px; font-size: 14px; cursor: pointer; }

  .panel { width: 100%; max-width: 440px; display: none; flex-direction: column; align-items: center; }
  .panel.active { display: flex; }

  /* Flashcard */
  .card { width: 100%; height: 240px; perspective: 1200px; cursor: pointer; margin-bottom: 14px; }
  .card-inner { position: relative; width: 100%; height: 100%; transition: transform .5s; transform-style: preserve-3d; }
  .card.flipped .card-inner { transform: rotateY(180deg); }
  .face {
    position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
    background: var(--card); border-radius: 22px; box-shadow: 0 12px 30px rgba(0,0,0,.18);
    display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
  }
  .face .word { font-size: 40px; font-weight: 700; text-align: center; }
  .face .hint { position: absolute; bottom: 16px; color: var(--muted); font-size: 13px; }
  .back { transform: rotateY(180deg); background: #fff7f2; }
  .back .cn { font-size: 30px; font-weight: 700; color: var(--accent); text-align: center; }

  .speak-btn {
    margin-top: 6px; background: rgba(255,255,255,.9); border: none; border-radius: 50%;
    width: 52px; height: 52px; font-size: 24px; cursor: pointer; box-shadow: 0 6px 14px rgba(0,0,0,.15);
  }

  .nav { display: flex; gap: 12px; margin-top: 14px; width: 100%; }
  .nav button { flex: 1; border: none; border-radius: 14px; padding: 14px; font-size: 16px; color: #fff; background: rgba(255,255,255,.25); cursor: pointer; }
  .nav button.primary { background: var(--accent); font-weight: 600; }
  .counter { color: #fff; margin-top: 12px; font-size: 14px; opacity: .9; }

  .autoplay { display: flex; align-items: center; gap: 14px; margin-top: 14px; flex-wrap: wrap; justify-content: center; }
  .play-btn { border: none; border-radius: 999px; padding: 12px 26px; font-size: 16px; font-weight: 600; cursor: pointer; background: var(--green); color: #fff; box-shadow: 0 6px 14px rgba(0,0,0,.15); }
  .play-btn.playing { background: var(--red); }

  /* Quiz */
  .quiz-q { color:#fff; font-size: 15px; margin-bottom: 10px; }
  .quiz-word { background: #fff; border-radius: 18px; padding: 24px; width: 100%; text-align: center; font-size: 30px; font-weight: 700; box-shadow: 0 10px 24px rgba(0,0,0,.15); margin-bottom: 16px; }
  .options { width: 100%; display: flex; flex-direction: column; gap: 10px; }
  .options button { border: none; background: #fff; border-radius: 14px; padding: 16px; font-size: 18px; cursor: pointer; transition: .15s; box-shadow: 0 4px 10px rgba(0,0,0,.08); }
  .options button.correct { background: var(--green); color:#fff; }
  .options button.wrong { background: var(--red); color:#fff; }
  .score { color:#fff; margin-top: 16px; font-size: 16px; }
  .stars { font-size: 22px; margin-top: 6px; }
  .next-btn { margin-top: 16px; border:none; background: var(--accent); color:#fff; padding: 12px 28px; border-radius: 14px; font-size: 16px; cursor:pointer; display:none; }

  /* Speak / 跟读 */
  .big-word { background:#fff; border-radius: 20px; padding: 30px; width:100%; text-align:center; box-shadow: 0 10px 24px rgba(0,0,0,.15); margin-bottom: 8px; }
  .big-word .w { font-size: 40px; font-weight: 700; }
  .big-word .m { color: var(--muted); margin-top: 8px; font-size: 18px; }
  .mic-btn { border:none; border-radius: 50%; width: 84px; height: 84px; font-size: 38px; cursor:pointer; background: var(--accent); color:#fff; box-shadow: 0 8px 20px rgba(0,0,0,.2); margin: 8px 0; transition: .2s; }
  .mic-btn.recording { background: var(--red); animation: pulse 1s infinite; }
  @keyframes pulse { 0%{transform:scale(1);} 50%{transform:scale(1.08);} 100%{transform:scale(1);} }
  .result-box { width:100%; background:#fff; border-radius:16px; padding:18px; margin-top:10px; text-align:center; box-shadow:0 6px 16px rgba(0,0,0,.12); min-height: 70px; }
  .result-box .pct { font-size: 40px; font-weight: 800; }
  .result-box .heard { color: var(--muted); font-size: 14px; margin-top: 6px; }
  .result-box .fb { font-size: 18px; margin-top: 6px; font-weight: 600; }

  /* 错词本 */
  .wrong-list { width:100%; display:flex; flex-direction:column; gap:10px; }
  .wrong-item { background:#fff; border-radius:14px; padding:14px 16px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 4px 10px rgba(0,0,0,.08); }
  .wrong-item .en { font-weight:700; font-size:18px; }
  .wrong-item .cn { color: var(--muted); font-size:14px; margin-left:8px; }
  .wrong-item .acts button { border:none; border-radius:10px; padding:8px 10px; margin-left:6px; cursor:pointer; font-size:14px; }
  .empty { color:#fff; opacity:.85; text-align:center; padding:20px; }

  footer { color:#fff; opacity:.75; font-size:12px; margin-top: 24px; text-align:center; }
</style>
</head>
<body>
  <header>
    <h1>🦉 AI 背单词</h1>
    <p>译林版小学英语 · 每天进步一点点</p>
    <div class="streak">🔥 连续打卡 <b id="streakNum">0</b> 天　·　累计 <b id="daysNum">0</b> 天</div>
  </header>

  <div class="tabs">
    <button id="tab-learn" class="active" onclick="switchTab('learn')">📖 学单词</button>
    <button id="tab-quiz" onclick="switchTab('quiz')">✏️ 测验</button>
    <button id="tab-speak" onclick="switchTab('speak')">🎤 跟读</button>
    <button id="tab-wrong" onclick="switchTab('wrong')">❌ 错词本</button>
  </div>

  <div class="book-picker">
    <label>选择册数
      <select id="bookSel" onchange="onBookChange()">
        <option value="all">全部</option>
        <option value="3A">三年级上 3A</option>
        <option value="3B">三年级下 3B</option>
        <option value="4A">四年级上 4A</option>
        <option value="4B">四年级下 4B</option>
        <option value="5A">五年级上 5A</option>
        <option value="5B">五年级下 5B</option>
        <option value="6A">六年级上 6A</option>
        <option value="6B">六年级下 6B</option>
      </select>
    </label>
  </div>

  <!-- 学单词 -->
  <section id="panel-learn" class="panel active">
    <div class="card" id="card" onclick="flipCard()">
      <div class="card-inner">
        <div class="face front">
          <div class="word" id="fWord">apple</div>
          <div class="hint">点击卡片看中文意思</div>
        </div>
        <div class="face back">
          <div class="cn" id="fCn">苹果</div>
          <div class="hint">点击卡片翻回英文</div>
        </div>
      </div>
    </div>
    <button class="speak-btn" onclick="event.stopPropagation(); speakCurrent()">🔊</button>
    <div class="nav">
      <button onclick="prevWord()">⬅ 上一个</button>
      <button class="primary" onclick="nextWord()">下一个 ➡</button>
    </div>
    <div class="autoplay">
      <button id="playBtn" class="play-btn" onclick="toggleAutoPlay()">▶ 自动播放</button>
      <label class="speed">每词停留
        <select id="speedSel" onchange="onSpeedChange()">
          <option value="3000">3 秒</option>
          <option value="4000" selected>4 秒</option>
          <option value="5000">5 秒</option>
          <option value="7000">7 秒</option>
        </select>
      </label>
    </div>
    <div class="counter" id="counter">第 1 / 30 个</div>
  </section>

  <!-- 测验 -->
  <section id="panel-quiz" class="panel">
    <div class="quiz-q">下面这个单词是什么意思？</div>
    <div class="quiz-word" id="quizWord">apple</div>
    <div class="options" id="options"></div>
    <button class="next-btn" id="nextBtn" onclick="newQuestion()">下一题 ➡</button>
    <div class="score" id="score">得分：0　连对：0</div>
    <div class="stars" id="stars"></div>
  </section>

  <!-- 跟读 -->
  <section id="panel-speak" class="panel">
    <div class="quiz-q">听发音，然后点麦克风跟读，AI 给你打分！</div>
    <div class="big-word">
      <div class="w" id="spWord">apple</div>
      <div class="m" id="spCn">苹果</div>
    </div>
    <button class="speak-btn" onclick="speak(document.getElementById('spWord').textContent)">🔊 先听一遍</button>
    <button class="mic-btn" id="micBtn" onclick="startRecord()">🎤</button>
    <div class="result-box" id="spResult">点上面的麦克风，读出这个单词</div>
    <div class="nav">
      <button onclick="prevSpeak()">⬅ 上一个</button>
      <button class="primary" onclick="nextSpeak()">下一个 ➡</button>
    </div>
  </section>

  <!-- 错词本 -->
  <section id="panel-wrong" class="panel">
    <div class="quiz-q" id="wrongTitle">这里收录你答错的单词，多复习几遍就记住啦！</div>
    <div class="wrong-list" id="wrongList"></div>
  </section>

  <footer>做给最棒的小朋友 ❤️ · 译林版核心词库</footer>

  const BOOKS = ["3A","3B","4A","4B","5A","5B","6A","6B"];
  let selectedBook = "all";
  let WORDS = ALL_WORDS.slice();

  // ================= 学单词 =================
  let idx = 0;
  const card = document.getElementById('card');

  function renderCard() {
    if (!WORDS.length) return;
    card.classList.remove('flipped');
    document.getElementById('fWord').textContent = WORDS[idx].en;
    document.getElementById('fCn').textContent = WORDS[idx].cn;
    document.getElementById('counter').textContent = `第 ${idx + 1} / ${WORDS.length} 个`;
  }
  function flipCard() { checkInToday(); card.classList.toggle('flipped'); }
  function nextWord() { if (playing) stopAutoPlay(); idx = (idx + 1) % WORDS.length; renderCard(); }
  function prevWord() { if (playing) stopAutoPlay(); idx = (idx - 1 + WORDS.length) % WORDS.length; renderCard(); }
  function speakCurrent() { speak(WORDS[idx].en); }

  function speak(text) {
    if (!('speechSynthesis' in window)) return;
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US'; u.rate = 0.9;
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
  }

  // 中文朗读（不打断前面的英文，排队接着读）
  function speakZh(text) {
    if (!('speechSynthesis' in window)) return;
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'zh-CN'; u.rate = 0.9;
    speechSynthesis.speak(u);
  }

  // ================= 自动播放 =================
  let playing = false, interval = 4000, timers = [];
  function clearTimers() { timers.forEach(clearTimeout); timers = []; }
  function toggleAutoPlay() { playing ? stopAutoPlay() : startAutoPlay(); }
  function startAutoPlay() {
    playing = true; checkInToday();
    const b = document.getElementById('playBtn'); b.textContent = '⏸ 暂停'; b.classList.add('playing');
    switchTab('learn'); playStep();
  }
  function stopAutoPlay() {
    playing = false; clearTimers(); speechSynthesis.cancel();
    const b = document.getElementById('playBtn'); b.textContent = '▶ 自动播放'; b.classList.remove('playing');
  }
  function playStep() {
    if (!playing) return;
    renderCard(); speakCurrent();                                              // 英文第一遍
    timers.push(setTimeout(() => { if (playing) speakCurrent(); }, 1200));     // 英文第二遍
    timers.push(setTimeout(() => {                                            // 翻中文 + 中文朗读
      if (!playing) return;
      card.classList.add('flipped');
      speakZh(WORDS[idx].cn);
    }, interval * 0.5));
    timers.push(setTimeout(() => { if (!playing) return; idx = (idx + 1) % WORDS.length; playStep(); }, interval));
  }
  function onSpeedChange() { interval = parseInt(document.getElementById('speedSel').value, 10); if (playing) { clearTimers(); playStep(); } }

  // ================= 测验 =================
  let score = 0, streakQ = 0, answered = false, currentWord = null;
  function newQuestion() {
    if (!WORDS.length) return;
    answered = false;
    document.getElementById('nextBtn').style.display = 'none';
    currentWord = WORDS[Math.floor(Math.random() * WORDS.length)];
    document.getElementById('quizWord').textContent = currentWord.en;
    const opts = [currentWord];
    const pool = ALL_WORDS;
    while (opts.length < 4) {
      const w = pool[Math.floor(Math.random() * pool.length)];
      if (!opts.includes(w)) opts.push(w);
    }
    shuffle(opts);
    const box = document.getElementById('options'); box.innerHTML = '';
    opts.forEach(w => {
      const b = document.createElement('button');
      b.textContent = w.cn;
      b.onclick = () => checkAnswer(b, w);
      box.appendChild(b);
    });
    speak(currentWord.en);
  }
  function checkAnswer(btn, chosen) {
    if (answered) return;
    answered = true; checkInToday();
    if (chosen === currentWord) {
      btn.classList.add('correct'); score++; streakQ++;
    } else {
      btn.classList.add('wrong'); streakQ = 0;
      addWrongWord(currentWord);
      [...document.getElementById('options').children].forEach(b => {
        if (b.textContent === currentWord.cn) b.classList.add('correct');
      });
    }
    updateScore();
    document.getElementById('nextBtn').style.display = 'inline-block';
  }
  function updateScore() {
    document.getElementById('score').textContent = `得分：${score}　连对：${streakQ}`;
    document.getElementById('stars').textContent = '⭐'.repeat(Math.min(streakQ, 10));
    localStorage.setItem('aiwords_score', score);
  }
  function shuffle(a) { for (let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} }

  // ================= 跟读 + AI 打分 =================
  let spIdx = 0;
  function renderSpeak() {
    if (!WORDS.length) return;
    spIdx = spIdx % WORDS.length;
    document.getElementById('spWord').textContent = WORDS[spIdx].en;
    document.getElementById('spCn').textContent = WORDS[spIdx].cn;
    document.getElementById('spResult').innerHTML = '点上面的麦克风，读出这个单词';
  }
  function nextSpeak() { spIdx = (spIdx + 1) % WORDS.length; renderSpeak(); speak(WORDS[spIdx].en); }
  function prevSpeak() { spIdx = (spIdx - 1 + WORDS.length) % WORDS.length; renderSpeak(); }

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recog = null;
  function startRecord() {
    const res = document.getElementById('spResult');
    if (!SR) { res.innerHTML = '⚠️ 这个浏览器不支持语音识别，请用 <b>Edge</b> 或 <b>Chrome</b> 打开'; return; }
    checkInToday();
    const btn = document.getElementById('micBtn');
    recog = new SR();
    recog.lang = 'en-US'; recog.interimResults = false; recog.maxAlternatives = 3;
    btn.classList.add('recording'); btn.textContent = '●';
    res.innerHTML = '🎧 正在听……请读出单词';
    recog.start();
    recog.onresult = (e) => {
      let best = '';
      for (const alt of e.results[0]) { best = alt.transcript; break; }
      const target = WORDS[spIdx].en;
      const pct = scoreSpeech(target, [...e.results[0]].map(a => a.transcript));
      showScore(pct, best);
    };
    recog.onerror = (e) => {
      res.innerHTML = e.error === 'no-speech' ? '没听清，再读一次试试～'
        : (e.error === 'not-allowed' ? '需要允许使用麦克风哦（浏览器上方会弹出请求）' : '出错了，再试一次');
      resetMic();
    };
    recog.onend = () => resetMic();
  }
  function resetMic() { const b = document.getElementById('micBtn'); b.classList.remove('recording'); b.textContent = '🎤'; }

  function showScore(pct, heard) {
    let fb, color;
    if (pct >= 85) { fb = '太棒了！发音很标准 🎉'; color = 'var(--green)'; }
    else if (pct >= 60) { fb = '不错，再清晰一点会更好 👍'; color = 'var(--accent)'; }
    else { fb = '再听一遍，慢慢跟读 💪'; color = 'var(--red)'; }
    document.getElementById('spResult').innerHTML =
      `<div class="pct" style="color:${color}">${pct}分</div>` +
      `<div class="fb">${fb}</div>` +
      `<div class="heard">AI 听到你读的是：${heard || '（没听清）'}</div>`;
  }

  // 用编辑距离算相似度，取多个候选里最高分
  function scoreSpeech(target, heardList) {
    const t = norm(target);
    let best = 0;
    heardList.forEach(h => {
      const s = similarity(t, norm(h));
      if (s > best) best = s;
    });
    return Math.round(best * 100);
  }
  function norm(s) { return (s || '').toLowerCase().replace(/[^a-z ]/g, '').trim(); }
  function similarity(a, b) {
    if (!a && !b) return 1;
    const d = levenshtein(a, b);
    return 1 - d / Math.max(a.length, b.length, 1);
  }
  function levenshtein(a, b) {
    const m = a.length, n = b.length;
    const dp = Array.from({length: m+1}, (_,i) => [i, ...Array(n).fill(0)]);
    for (let j=0;j<=n;j++) dp[0][j]=j;
    for (let i=1;i<=m;i++) for (let j=1;j<=n;j++)
      dp[i][j] = a[i-1]===b[j-1] ? dp[i-1][j-1] : 1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
    return dp[m][n];
  }

  // ================= 错词本 =================
  function getWrong() { try { return JSON.parse(localStorage.getItem('aiwords_wrong') || '[]'); } catch { return []; } }
  function saveWrong(list) { localStorage.setItem('aiwords_wrong', JSON.stringify(list)); }
  function addWrongWord(w) {
    const list = getWrong();
    if (!list.some(x => x.en === w.en)) { list.push({ en: w.en, cn: w.cn }); saveWrong(list); }
  }
  function removeWrong(en) { saveWrong(getWrong().filter(x => x.en !== en)); renderWrong(); }
  function renderWrong() {
    const list = getWrong();
    const box = document.getElementById('wrongList');
    const title = document.getElementById('wrongTitle');
    if (!list.length) {
      title.textContent = '还没有错词。去测验里做题，答错的词会自动收到这里～';
      box.innerHTML = '<div class="empty">🎉 目前没有错词，真棒！</div>';
      return;
    }
    title.textContent = `错词本（共 ${list.length} 个）· 点 ✓ 表示已掌握`;
    box.innerHTML = '';
    list.forEach(w => {
      const div = document.createElement('div');
      div.className = 'wrong-item';
      div.innerHTML = `<div><span class="en">${w.en}</span><span class="cn">${w.cn}</span></div>`;
      const acts = document.createElement('div'); acts.className = 'acts';
      const sp = document.createElement('button'); sp.textContent = '🔊'; sp.style.background = '#eef'; sp.onclick = () => speak(w.en);
      const ok = document.createElement('button'); ok.textContent = '✓ 掌握'; ok.style.background = 'var(--green)'; ok.style.color = '#fff'; ok.onclick = () => removeWrong(w.en);
      acts.appendChild(sp); acts.appendChild(ok); div.appendChild(acts);
      box.appendChild(div);
    });
  }

  // ================= 每日打卡 =================
  function todayStr() { const d = new Date(); return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`; }
  function getDays() { try { return JSON.parse(localStorage.getItem('aiwords_days') || '[]'); } catch { return []; } }
  function checkInToday() {
    const days = getDays(); const t = todayStr();
    if (!days.includes(t)) { days.push(t); localStorage.setItem('aiwords_days', JSON.stringify(days)); }
    renderStreak();
  }
  function renderStreak() {
    const days = getDays().map(s => new Date(s.replace(/-/g,'/'))).sort((a,b)=>a-b);
    document.getElementById('daysNum').textContent = getDays().length;
    let streak = 0;
    let cur = new Date(); cur.setHours(0,0,0,0);
    const set = new Set(getDays().map(s => new Date(s.replace(/-/g,'/')).setHours(0,0,0,0)));
    while (set.has(cur.getTime())) { streak++; cur.setDate(cur.getDate()-1); }
    document.getElementById('streakNum').textContent = streak;
  }

  // ================= 切换 & 初始化 =================
  function applyBookFilter() {
    WORDS = selectedBook === 'all' ? ALL_WORDS.slice() : ALL_WORDS.filter(w => w.book === selectedBook);
    idx = 0; spIdx = 0; currentWord = null;
    renderCard(); renderSpeak();
  }
  function onBookChange() {
    if (playing) stopAutoPlay();
    selectedBook = document.getElementById('bookSel').value;
    applyBookFilter();
    if (document.getElementById('panel-quiz').classList.contains('active')) newQuestion();
  }
  function switchTab(name) {
    if (name !== 'learn' && playing) stopAutoPlay();
    ['learn','quiz','speak','wrong'].forEach(n => {
      document.getElementById('tab-'+n).classList.toggle('active', n === name);
      document.getElementById('panel-'+n).classList.toggle('active', n === name);
    });
    if (name === 'quiz' && !currentWord) newQuestion();
    if (name === 'speak') renderSpeak();
    if (name === 'wrong') renderWrong();
  }

  document.addEventListener('keydown', (e) => {
    if (document.getElementById('panel-learn').classList.contains('active')) {
      if (e.key === 'ArrowRight') nextWord();
      if (e.key === 'ArrowLeft') prevWord();
      if (e.key === ' ') { e.preventDefault(); flipCard(); }
    }
  });

  score = parseInt(localStorage.getItem('aiwords_score') || '0', 10);
  renderCard(); renderSpeak(); updateScore(); renderStreak();
