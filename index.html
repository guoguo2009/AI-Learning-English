<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI 背单词 · 译林版小学英语</title>
<style>
  :root {
    --bg1: #6a8dff;
    --bg2: #9b7bff;
    --card: #ffffff;
    --accent: #ff8a5b;
    --green: #35c98a;
    --red: #ff6b6b;
    --text: #2b2d42;
    --muted: #8a8fa3;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
    background: linear-gradient(135deg, var(--bg1), var(--bg2));
    min-height: 100vh;
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }
  header { text-align: center; color: #fff; margin: 6px 0 14px; }
  header h1 { font-size: 26px; letter-spacing: 1px; }
  header p { opacity: .9; margin-top: 6px; font-size: 14px; }

  .streak {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,.2); color:#fff;
    padding: 6px 16px; border-radius: 999px; margin-top: 10px; font-size: 14px;
  }
  .streak b { font-size: 18px; }

  .tabs {
    display: flex; gap: 6px; flex-wrap: wrap; justify-content: center;
    background: rgba(255,255,255,.2); padding: 6px; border-radius: 18px; margin-bottom: 14px;
  }
  .tabs button {
    border: none; background: transparent; color: #fff;
    padding: 8px 14px; border-radius: 12px; font-size: 15px; cursor: pointer; transition: .2s;
  }
  .tabs button.active { background: #fff; color: var(--bg1); font-weight: 600; }

  .book-picker { margin-bottom: 16px; }
  .speed, .book-picker label { color: #fff; font-size: 14px; display: flex; align-items: center; gap: 6px; }
  select { border: none; border-radius: 10px; padding: 6px 10px; font-size: 14px; cursor: pointer; }

  .panel { width: 100%; max-width: 440px; display: none; flex-direction: column; align-items: center; }
  .panel.active { display: flex; }

  /* Flashcard */
  .card { width: 100%; height: 240px; perspective: 1200px; cursor: pointer; margin-bottom: 14px; }
  .card-inner { position: relative; width: 100%; height: 100%; transition: transform .5s; transform-style: preserve-3d; }
  .card.flipped .card-inner { transform: rotateY(180deg); }
  .face {
    position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
    background: var(--card); border-radius: 22px; box-shadow: 0 12px 30px rgba(0,0,0,.18);
    display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
  }
  .face .word { font-size: 40px; font-weight: 700; text-align: center; }
  .face .phonetic { color: var(--muted); font-size: 20px; margin-top: 10px; }
  .face .hint { position: absolute; bottom: 16px; color: var(--muted); font-size: 13px; }
  .back { transform: rotateY(180deg); background: #fff7f2; }
  .back .cn { font-size: 30px; font-weight: 700; color: var(--accent); text-align: center; }

  .speak-btn {
    margin-top: 6px; background: rgba(255,255,255,.9); border: none; border-radius: 50%;
    width: 52px; height: 52px; font-size: 24px; cursor: pointer; box-shadow: 0 6px 14px rgba(0,0,0,.15);
  }

  .nav { display: flex; gap: 12px; margin-top: 14px; width: 100%; }
  .nav button { flex: 1; border: none; border-radius: 14px; padding: 14px; font-size: 16px; color: #fff; background: rgba(255,255,255,.25); cursor: pointer; }
  .nav button.primary { background: var(--accent); font-weight: 600; }
  .counter { color: #fff; margin-top: 12px; font-size: 14px; opacity: .9; }

  .autoplay { display: flex; align-items: center; gap: 14px; margin-top: 14px; flex-wrap: wrap; justify-content: center; }
  .play-btn { border: none; border-radius: 999px; padding: 12px 26px; font-size: 16px; font-weight: 600; cursor: pointer; background: var(--green); color: #fff; box-shadow: 0 6px 14px rgba(0,0,0,.15); }
  .play-btn.playing { background: var(--red); }

  /* Quiz */
  .quiz-q { color:#fff; font-size: 15px; margin-bottom: 10px; }
  .quiz-word { background: #fff; border-radius: 18px; padding: 24px; width: 100%; text-align: center; font-size: 30px; font-weight: 700; box-shadow: 0 10px 24px rgba(0,0,0,.15); margin-bottom: 16px; }
  .options { width: 100%; display: flex; flex-direction: column; gap: 10px; }
  .options button { border: none; background: #fff; border-radius: 14px; padding: 16px; font-size: 18px; cursor: pointer; transition: .15s; box-shadow: 0 4px 10px rgba(0,0,0,.08); }
  .options button.correct { background: var(--green); color:#fff; }
  .options button.wrong { background: var(--red); color:#fff; }
  .score { color:#fff; margin-top: 16px; font-size: 16px; }
  .stars { font-size: 22px; margin-top: 6px; }
  .next-btn { margin-top: 16px; border:none; background: var(--accent); color:#fff; padding: 12px 28px; border-radius: 14px; font-size: 16px; cursor:pointer; display:none; }

  /* Speak / 跟读 */
  .big-word { background:#fff; border-radius: 20px; padding: 30px; width:100%; text-align:center; box-shadow: 0 10px 24px rgba(0,0,0,.15); margin-bottom: 8px; }
  .big-word .w { font-size: 40px; font-weight: 700; }
  .big-word .m { color: var(--muted); margin-top: 8px; font-size: 18px; }
  .speak-actions { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin: 12px 0 4px; width:100%; }
  .sp-btn { border:none; border-radius: 14px; padding: 12px 16px; font-size: 15px; font-weight:600; cursor:pointer; background:#fff; color: var(--text); box-shadow: 0 6px 14px rgba(0,0,0,.12); }
  .sp-btn.rec { background: var(--accent); color:#fff; }
  .sp-btn.rec.recording { background: var(--red); animation: pulse 1s infinite; }
  .sp-btn:disabled { opacity:.5; cursor: default; }
  @keyframes pulse { 0%{transform:scale(1);} 50%{transform:scale(1.06);} 100%{transform:scale(1);} }
  .result-box { width:100%; background:#fff; border-radius:16px; padding:16px; margin-top:10px; text-align:center; box-shadow:0 6px 16px rgba(0,0,0,.12); min-height: 56px; font-size: 15px; }
  .result-box .fb { font-size: 18px; margin-top: 4px; font-weight: 600; }
  .selfrate { color:#fff; margin-top:14px; font-size:15px; display:flex; align-items:center; gap:10px; }
  .rate-stars span { font-size: 30px; cursor:pointer; filter: grayscale(1); opacity:.7; transition:.15s; }
  .rate-stars span.on { filter: none; opacity:1; transform: scale(1.1); }

  /* 错词本 */
  .wrong-list { width:100%; display:flex; flex-direction:column; gap:10px; }
  .wrong-item { background:#fff; border-radius:14px; padding:14px 16px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 4px 10px rgba(0,0,0,.08); }
  .wrong-item .en { font-weight:700; font-size:18px; }
  .wrong-item .cn { color: var(--muted); font-size:14px; margin-left:8px; }
  .wrong-item .acts button { border:none; border-radius:10px; padding:8px 10px; margin-left:6px; cursor:pointer; font-size:14px; }
  .empty { color:#fff; opacity:.85; text-align:center; padding:20px; }
  .wrong-item.done { opacity:.55; }
  .wrong-item .tag { font-size:12px; color:#fff; background:var(--red); border-radius:8px; padding:2px 6px; margin-left:8px; }
  .wrong-actions { width:100%; display:flex; gap:10px; margin-bottom:12px; flex-wrap:wrap; }
  .wrong-actions button { flex:1; border:none; border-radius:12px; padding:12px; font-size:15px; font-weight:600; cursor:pointer; }

  /* 默写 */
  .dict-input { width:100%; border:none; border-radius:14px; padding:16px; font-size:22px; text-align:center; margin:14px 0 10px; box-shadow:0 6px 14px rgba(0,0,0,.12); }
  .result-box .ok { color: var(--green); font-weight:700; }
  .result-box .ng { color: var(--red); font-weight:700; }

  /* 统计 */
  .stats-grid { width:100%; display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .stat-card { background:#fff; border-radius:16px; padding:18px; text-align:center; box-shadow:0 6px 16px rgba(0,0,0,.12); }
  .stat-card .num { font-size:30px; font-weight:800; color:var(--bg1); }
  .stat-card .lbl { color:var(--muted); font-size:13px; margin-top:4px; }
  .stats-books { width:100%; background:#fff; border-radius:16px; padding:16px; margin-top:14px; box-shadow:0 6px 16px rgba(0,0,0,.12); }
  .bookrow { display:flex; align-items:center; gap:10px; margin:8px 0; font-size:14px; }
  .bookrow .bar { flex:1; height:12px; background:#eee; border-radius:8px; overflow:hidden; }
  .bookrow .bar > i { display:block; height:100%; background:var(--green); }
  .bookrow .bl { width:64px; color:var(--text); }
  .bookrow .bn { width:70px; text-align:right; color:var(--muted); }

  footer { color:#fff; opacity:.75; font-size:12px; margin-top: 24px; text-align:center; }
</style>
</head>
<body>
  <header>
    <h1>🦉 AI 背单词</h1>
    <p>译林版小学英语 · 每天进步一点点</p>
    <div class="streak">🔥 连续打卡 <b id="streakNum">0</b> 天　·　累计 <b id="daysNum">0</b> 天</div>
  </header>

  <div class="tabs">
    <button id="tab-learn" class="active" onclick="switchTab('learn')">📖 学单词</button>
    <button id="tab-quiz" onclick="switchTab('quiz')">✏️ 测验</button>
    <button id="tab-speak" onclick="switchTab('speak')">🎤 跟读</button>
    <button id="tab-dict" onclick="switchTab('dict')">✍️ 默写</button>
    <button id="tab-wrong" onclick="switchTab('wrong')">❌ 错词本</button>
    <button id="tab-stats" onclick="switchTab('stats')">📊 统计</button>
  </div>

  <div class="book-picker">
    <label>选择册数
      <select id="bookSel" onchange="onBookChange()">
        <option value="all">全部</option>
        <option value="3A">三年级上 3A</option>
        <option value="3B">三年级下 3B</option>
        <option value="4A">四年级上 4A</option>
        <option value="4B">四年级下 4B</option>
        <option value="5A">五年级上 5A</option>
        <option value="5B">五年级下 5B</option>
        <option value="6A">六年级上 6A</option>
        <option value="6B">六年级下 6B</option>
      </select>
    </label>
    <label style="margin-left:12px">单元
      <select id="unitSel" onchange="onUnitChange()">
        <option value="all">全部单元</option>
      </select>
    </label>
  </div>

  <!-- 学单词 -->
  <section id="panel-learn" class="panel active">
    <div class="card" id="card" onclick="flipCard()">
      <div class="card-inner">
        <div class="face front">
          <div class="word" id="fWord">apple</div>
          <div class="phonetic" id="fPh"></div>
          <div class="hint">点击卡片看中文意思</div>
        </div>
        <div class="face back">
          <div class="cn" id="fCn">苹果</div>
          <div class="hint">点击卡片翻回英文</div>
        </div>
      </div>
    </div>
    <button class="speak-btn" onclick="event.stopPropagation(); speakCurrent()">🔊</button>
    <div class="nav">
      <button onclick="prevWord()">⬅ 上一个</button>
      <button class="primary" onclick="nextWord()">下一个 ➡</button>
    </div>
    <div class="autoplay">
      <button id="playBtn" class="play-btn" onclick="toggleAutoPlay()">▶ 自动播放</button>
      <label class="speed">每词停留
        <select id="speedSel" onchange="onSpeedChange()">
          <option value="3000">3 秒</option>
          <option value="4000" selected>4 秒</option>
          <option value="5000">5 秒</option>
          <option value="7000">7 秒</option>
        </select>
      </label>
    </div>
    <div class="counter" id="counter">第 1 / 30 个</div>
  </section>

  <!-- 测验 -->
  <section id="panel-quiz" class="panel">
    <div class="quiz-q">下面这个单词是什么意思？</div>
    <div class="quiz-word" id="quizWord">apple</div>
    <div class="options" id="options"></div>
    <button class="next-btn" id="nextBtn" onclick="newQuestion()">下一题 ➡</button>
    <div class="score" id="score">得分：0　连对：0</div>
    <div class="stars" id="stars"></div>
  </section>

  <!-- 跟读 -->
  <section id="panel-speak" class="panel">
    <div class="quiz-q">① 听标准发音 → ② 录下自己读 → ③ 对比，再给自己打星星！</div>
    <div class="big-word">
      <div class="w" id="spWord">apple</div>
      <div class="m" id="spCn">苹果</div>
    </div>
    <div class="speak-actions">
      <button class="sp-btn" onclick="speak(document.getElementById('spWord').textContent)">🔊 标准发音</button>
      <button class="sp-btn rec" id="recBtn" onclick="toggleRecord()">🎤 开始录音</button>
      <button class="sp-btn" id="playMyBtn" onclick="playMyVoice()" disabled>▶ 我的录音</button>
    </div>
    <div class="result-box" id="spResult">点「🎤 开始录音」，读出上面的单词</div>
    <div class="selfrate" id="selfRate">
      <span>AI 评分</span>
      <span class="rate-stars" id="rateStars"></span>
    </div>
    <audio id="myAudio" style="display:none"></audio>
    <div class="nav">
      <button onclick="prevSpeak()">⬅ 上一个</button>
      <button class="primary" onclick="nextSpeak()">下一个 ➡</button>
    </div>
  </section>

  <!-- 默写 -->
  <section id="panel-dict" class="panel">
    <div class="quiz-q">看中文（或听发音），把英文拼写出来！</div>
    <div class="quiz-word" id="dictCn">苹果</div>
    <button class="sp-btn" onclick="speak(dictWord ? dictWord.en : '')">🔊 听一遍</button>
    <input id="dictInput" class="dict-input" type="text" autocomplete="off" autocorrect="off"
           autocapitalize="off" spellcheck="false" placeholder="在这里输入英文…"
           onkeydown="if(event.key==='Enter') checkDict()" />
    <button class="next-btn" id="dictCheckBtn" style="display:inline-block" onclick="checkDict()">✓ 检查</button>
    <div class="result-box" id="dictResult">拼写后点「检查」，或按回车</div>
    <button class="next-btn" id="dictNextBtn" style="display:none" onclick="newDict()">下一个 ➡</button>
    <div class="score" id="dictScore">默写：对 0 / 共 0</div>
  </section>

  <!-- 错词本 -->
  <section id="panel-wrong" class="panel">
    <div class="quiz-q" id="wrongTitle">这里收录你答错/默错的单词，会一直保存，方便反复复习。</div>
    <div class="wrong-actions" id="wrongActions"></div>
    <div class="wrong-list" id="wrongList"></div>
  </section>

  <!-- 统计 -->
  <section id="panel-stats" class="panel">
    <div class="stats-grid" id="statsGrid"></div>
    <div class="stats-books" id="statsBooks"></div>
  </section>

  <footer>做给最棒的小朋友 ❤️ · 译林版全 8 册单词（共 991 词）</footer>

<script src="words.js"></script>
<script>
  // 全部单词从外部文件 words.js 载入（译林版全 8 册，自动生成）

  const BOOKS = ["3A","3B","4A","4B","5A","5B","6A","6B"];
  const BOOK_NAME = { "3A":"三上","3B":"三下","4A":"四上","4B":"四下","5A":"五上","5B":"五下","6A":"六上","6B":"六下" };
  let selectedBook = "all";
  let WORDS = ALL_WORDS.slice();

  // ================= 进度/统计存储 =================
  function lsGet(k, def) { try { const v = JSON.parse(localStorage.getItem(k)); return v == null ? def : v; } catch { return def; } }
  function lsSet(k, v) { localStorage.setItem(k, JSON.stringify(v)); }

  let seenSet = new Set(lsGet('aiwords_seen', []));   // 学过的单词
  function markSeen(en) {
    if (!seenSet.has(en)) { seenSet.add(en); lsSet('aiwords_seen', [...seenSet]); }
  }
  function addQuizStat(ok) {
    const s = lsGet('aiwords_quiz', { c: 0, t: 0 }); s.t++; if (ok) s.c++; lsSet('aiwords_quiz', s);
  }
  function addDictStat(ok) {
    const s = lsGet('aiwords_dict', { c: 0, t: 0 }); s.t++; if (ok) s.c++; lsSet('aiwords_dict', s);
  }

  // ================= 学单词 =================
  let idx = 0;
  const card = document.getElementById('card');

  function renderCard() {
    if (!WORDS.length) return;
    card.classList.remove('flipped');
    document.getElementById('fWord').textContent = WORDS[idx].en;
    document.getElementById('fPh').textContent = WORDS[idx].ph || '';
    document.getElementById('fCn').textContent = WORDS[idx].cn;
    document.getElementById('counter').textContent = `第 ${idx + 1} / ${WORDS.length} 个`;
    markSeen(WORDS[idx].en);
  }
  function flipCard() { checkInToday(); card.classList.toggle('flipped'); }
  function nextWord() { if (playing) stopAutoPlay(); idx = (idx + 1) % WORDS.length; renderCard(); }
  function prevWord() { if (playing) stopAutoPlay(); idx = (idx - 1 + WORDS.length) % WORDS.length; renderCard(); }
  function speakCurrent() { speak(WORDS[idx].en); }

  function speak(text) {
    if (!('speechSynthesis' in window)) return;
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US'; u.rate = 0.9;
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
  }

  // 中文朗读（不打断前面的英文，排队接着读）
  function speakZh(text) {
    if (!('speechSynthesis' in window)) return;
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'zh-CN'; u.rate = 0.9;
    speechSynthesis.speak(u);
  }

  // ================= 自动播放 =================
  let playing = false, interval = 4000, timers = [];
  function clearTimers() { timers.forEach(clearTimeout); timers = []; }
  function toggleAutoPlay() { playing ? stopAutoPlay() : startAutoPlay(); }
  function startAutoPlay() {
    playing = true; checkInToday();
    const b = document.getElementById('playBtn'); b.textContent = '⏸ 暂停'; b.classList.add('playing');
    switchTab('learn'); playStep();
  }
  function stopAutoPlay() {
    playing = false; clearTimers(); speechSynthesis.cancel();
    const b = document.getElementById('playBtn'); b.textContent = '▶ 自动播放'; b.classList.remove('playing');
  }
  function playStep() {
    if (!playing) return;
    renderCard(); speakCurrent();                                              // 英文第一遍
    timers.push(setTimeout(() => { if (playing) speakCurrent(); }, 1200));     // 英文第二遍
    timers.push(setTimeout(() => {                                            // 翻中文 + 中文朗读
      if (!playing) return;
      card.classList.add('flipped');
      speakZh(WORDS[idx].cn);
    }, interval * 0.5));
    timers.push(setTimeout(() => { if (!playing) return; idx = (idx + 1) % WORDS.length; playStep(); }, interval));
  }
  function onSpeedChange() { interval = parseInt(document.getElementById('speedSel').value, 10); if (playing) { clearTimers(); playStep(); } }

  // ================= 测验 =================
  let score = 0, streakQ = 0, answered = false, currentWord = null;
  function newQuestion() {
    if (!WORDS.length) return;
    answered = false;
    document.getElementById('nextBtn').style.display = 'none';
    currentWord = WORDS[Math.floor(Math.random() * WORDS.length)];
    document.getElementById('quizWord').textContent = currentWord.en;
    const opts = [currentWord];
    const pool = ALL_WORDS;
    while (opts.length < 4) {
      const w = pool[Math.floor(Math.random() * pool.length)];
      if (!opts.includes(w)) opts.push(w);
    }
    shuffle(opts);
    const box = document.getElementById('options'); box.innerHTML = '';
    opts.forEach(w => {
      const b = document.createElement('button');
      b.textContent = w.cn;
      b.onclick = () => checkAnswer(b, w);
      box.appendChild(b);
    });
    speak(currentWord.en);
  }
  function checkAnswer(btn, chosen) {
    if (answered) return;
    answered = true; checkInToday(); markSeen(currentWord.en);
    if (chosen === currentWord) {
      btn.classList.add('correct'); score++; streakQ++; addQuizStat(true);
    } else {
      btn.classList.add('wrong'); streakQ = 0; addQuizStat(false);
      addWrongWord(currentWord);
      [...document.getElementById('options').children].forEach(b => {
        if (b.textContent === currentWord.cn) b.classList.add('correct');
      });
    }
    updateScore();
    document.getElementById('nextBtn').style.display = 'inline-block';
  }
  function updateScore() {
    document.getElementById('score').textContent = `得分：${score}　连对：${streakQ}`;
    document.getElementById('stars').textContent = '⭐'.repeat(Math.min(streakQ, 10));
    localStorage.setItem('aiwords_score', score);
  }
  function shuffle(a) { for (let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} }

  // ================= 跟读：录音 + 回放对比 + 自评星星 =================
  let spIdx = 0;
  let mediaRecorder = null, recChunks = [], recStream = null, recording = false, myBlobUrl = null;

  function renderSpeak() {
    if (!WORDS.length) return;
    spIdx = spIdx % WORDS.length;
    document.getElementById('spWord').textContent = WORDS[spIdx].en;
    document.getElementById('spCn').textContent = WORDS[spIdx].cn;
    document.getElementById('spResult').innerHTML = '点「🎤 开始录音」，读出上面的单词';
    resetMyVoice();
    setStars(0);
  }
  function nextSpeak() { if (recording) stopRecord(); spIdx = (spIdx + 1) % WORDS.length; renderSpeak(); speak(WORDS[spIdx].en); }
  function prevSpeak() { if (recording) stopRecord(); spIdx = (spIdx - 1 + WORDS.length) % WORDS.length; renderSpeak(); }

  function resetMyVoice() {
    document.getElementById('playMyBtn').disabled = true;
    if (myBlobUrl) { URL.revokeObjectURL(myBlobUrl); myBlobUrl = null; }
  }

  function toggleRecord() { recording ? stopRecord() : startRecord(); }

  async function startRecord() {
    const res = document.getElementById('spResult');
    if (!navigator.mediaDevices || !window.MediaRecorder) {
      res.innerHTML = '⚠️ 这个浏览器不支持录音，请更新系统，或用 Safari / Chrome 打开';
      return;
    }
    try {
      recStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch (err) {
      res.innerHTML = '🎤 需要允许使用麦克风：请在弹出的提示里点「允许」，然后再点一次录音';
      return;
    }
    checkInToday();
    recChunks = [];
    try { mediaRecorder = new MediaRecorder(recStream); }
    catch (e) { mediaRecorder = new MediaRecorder(recStream, { mimeType: 'audio/mp4' }); }
    mediaRecorder.ondataavailable = e => { if (e.data && e.data.size) recChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      const type = recChunks[0] ? recChunks[0].type : 'audio/mp4';
      const blob = new Blob(recChunks, { type });
      myBlobUrl = URL.createObjectURL(blob);
      document.getElementById('myAudio').src = myBlobUrl;
      document.getElementById('playMyBtn').disabled = false;
      if (recStream) { recStream.getTracks().forEach(t => t.stop()); recStream = null; }
      res.innerHTML = '⏳ AI 正在评分……';
      analyzeAndScore(blob).then(stars => { setStars(stars); showAuto(stars); });
    };
    mediaRecorder.start();
    recording = true;
    const b = document.getElementById('recBtn');
    b.classList.add('recording'); b.textContent = '⏹ 停止录音';
    res.innerHTML = '🔴 正在录音……请读出单词，读完点「⏹ 停止录音」';
  }

  function stopRecord() {
    recording = false;
    const b = document.getElementById('recBtn');
    b.classList.remove('recording'); b.textContent = '🎤 开始录音';
    try { if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop(); } catch (e) {}
  }

  function playMyVoice() {
    const a = document.getElementById('myAudio');
    if (a.src) { a.currentTime = 0; a.play(); }
  }

  function setStars(n) {
    const box = document.getElementById('rateStars');
    box.innerHTML = '';
    for (let i = 1; i <= 5; i++) {
      const s = document.createElement('span');
      s.textContent = '⭐';
      if (i <= n) s.classList.add('on');
      box.appendChild(s);
    }
  }
  function showAuto(n) {
    const msg = n >= 5 ? '太棒了！读得又清楚又响亮 🎉'
      : n >= 4 ? '很好，发音清晰 👍'
      : n >= 3 ? '不错，可以再大声、清楚一点 💪'
      : n >= 2 ? '声音有点小，靠近麦克风再读一遍试试'
      : '几乎没听到声音，请靠近麦克风大声读～';
    document.getElementById('spResult').innerHTML = `AI 给你打了 ${n} 颗星 · <span class="fb">${msg}</span>`;
  }

  // 分析录音：读出声了没、够不够响亮、长度合不合适 → 自动打 1~5 星
  async function analyzeAndScore(blob) {
    try {
      const buf = await blob.arrayBuffer();
      const AC = window.AudioContext || window.webkitAudioContext;
      const ctx = new AC();
      const audio = await ctx.decodeAudioData(buf);
      const data = audio.getChannelData(0);
      const sr = audio.sampleRate;
      const frame = Math.max(1, Math.floor(sr * 0.02)); // 20ms 一帧
      let voicedFrames = 0, totalFrames = 0, peak = 0;
      for (let i = 0; i < data.length; i += frame) {
        const end = Math.min(i + frame, data.length);
        let e = 0;
        for (let j = i; j < end; j++) { const v = data[j]; e += v * v; if (Math.abs(v) > peak) peak = Math.abs(v); }
        const rms = Math.sqrt(e / (end - i));
        totalFrames++;
        if (rms > 0.02) voicedFrames++;
      }
      if (ctx.close) ctx.close();
      const voicedSec = voicedFrames * 0.02;
      return computeStars(voicedSec, peak);
    } catch (e) {
      return 4; // 分析失败就给个鼓励分
    }
  }
  function computeStars(voicedSec, peak) {
    if (peak < 0.03 || voicedSec < 0.12) return 1;   // 基本没声音
    let stars = 3;
    if (peak > 0.08) stars++;         // 声音响亮
    if (voicedSec >= 0.3) stars++;    // 完整读出了单词
    if (peak < 0.05) stars--;         // 声音偏小
    return Math.max(1, Math.min(5, stars));
  }

  // ================= 错词本（长期保存 + 复习） =================
  function getWrong() { return lsGet('aiwords_wrong', []); }
  function saveWrong(list) { lsSet('aiwords_wrong', list); }
  function addWrongWord(w) {
    const list = getWrong();
    const found = list.find(x => x.en === w.en);
    if (found) { found.count = (found.count || 1) + 1; found.mastered = false; }
    else list.push({ en: w.en, cn: w.cn, ph: w.ph || '', book: w.book || '', unit: w.unit || '', count: 1, mastered: false });
    saveWrong(list);
  }
  function toggleMastered(en) {
    const list = getWrong(); const f = list.find(x => x.en === en);
    if (f) { f.mastered = !f.mastered; saveWrong(list); }
    renderWrong();
  }
  function removeWrong(en) { saveWrong(getWrong().filter(x => x.en !== en)); renderWrong(); }
  function clearMastered() { saveWrong(getWrong().filter(x => !x.mastered)); renderWrong(); }
  function reviewWrong() {
    const deck = getWrong().filter(x => !x.mastered);
    if (!deck.length) { alert('没有需要复习的错词啦！'); return; }
    WORDS = deck.map(x => ({ en: x.en, cn: x.cn, ph: x.ph || '', book: x.book || '', unit: x.unit || '' }));
    idx = 0; spIdx = 0; currentWord = null;
    document.getElementById('bookSel').value = 'all'; selectedBook = 'all'; selectedUnit = 'all'; fillUnitOptions();
    switchTab('quiz'); newQuestion();
  }
  function renderWrong() {
    const list = getWrong();
    const box = document.getElementById('wrongList');
    const acts = document.getElementById('wrongActions');
    const title = document.getElementById('wrongTitle');
    const active = list.filter(x => !x.mastered);
    if (!list.length) {
      title.textContent = '还没有错词。去「测验」或「默写」做题，做错的词会自动、长期地收到这里～';
      acts.innerHTML = ''; box.innerHTML = '<div class="empty">🎉 目前没有错词，真棒！</div>';
      return;
    }
    title.textContent = `错词本：待复习 ${active.length} 个 / 共 ${list.length} 个（会一直保存）`;
    acts.innerHTML = '';
    const rev = document.createElement('button'); rev.textContent = '🔁 复习错词'; rev.style.background = 'var(--accent)'; rev.style.color = '#fff'; rev.onclick = reviewWrong;
    const clr = document.createElement('button'); clr.textContent = '🗑 清空已掌握'; clr.style.background = '#eee'; clr.onclick = clearMastered;
    acts.appendChild(rev); acts.appendChild(clr);
    box.innerHTML = '';
    list.forEach(w => {
      const div = document.createElement('div');
      div.className = 'wrong-item' + (w.mastered ? ' done' : '');
      const phTxt = w.ph ? ` <span class="cn">${w.ph}</span>` : '';
      const cntTxt = (w.count > 1) ? `<span class="tag">错${w.count}次</span>` : '';
      div.innerHTML = `<div><span class="en">${w.en}</span>${phTxt}<span class="cn">${w.cn}</span>${cntTxt}</div>`;
      const a = document.createElement('div'); a.className = 'acts';
      const sp = document.createElement('button'); sp.textContent = '🔊'; sp.style.background = '#eef'; sp.onclick = () => speak(w.en);
      const ok = document.createElement('button'); ok.textContent = w.mastered ? '↩ 未掌握' : '✓ 已掌握';
      ok.style.background = w.mastered ? '#eee' : 'var(--green)'; ok.style.color = w.mastered ? 'var(--text)' : '#fff';
      ok.onclick = () => toggleMastered(w.en);
      const rm = document.createElement('button'); rm.textContent = '移除'; rm.style.background = 'var(--red)'; rm.style.color = '#fff'; rm.onclick = () => removeWrong(w.en);
      a.appendChild(sp); a.appendChild(ok); a.appendChild(rm); div.appendChild(a);
      box.appendChild(div);
    });
  }

  // ================= 默写 =================
  let dictWord = null;
  function newDict() {
    if (!WORDS.length) return;
    dictWord = WORDS[Math.floor(Math.random() * WORDS.length)];
    document.getElementById('dictCn').textContent = dictWord.cn;
    const inp = document.getElementById('dictInput'); inp.value = ''; inp.disabled = false; inp.focus();
    document.getElementById('dictResult').textContent = '拼写后点「检查」，或按回车';
    document.getElementById('dictCheckBtn').style.display = 'inline-block';
    document.getElementById('dictNextBtn').style.display = 'none';
    const s = lsGet('aiwords_dict', { c: 0, t: 0 });
    document.getElementById('dictScore').textContent = `默写：对 ${s.c} / 共 ${s.t}`;
    speak(dictWord.en);
  }
  function checkDict() {
    if (!dictWord) return;
    const inp = document.getElementById('dictInput');
    if (inp.disabled) return;
    const ans = inp.value.trim().toLowerCase();
    if (!ans) { document.getElementById('dictResult').textContent = '先输入英文再检查哦'; return; }
    checkInToday(); markSeen(dictWord.en);
    const ok = ans === dictWord.en.trim().toLowerCase();
    addDictStat(ok);
    const res = document.getElementById('dictResult');
    if (ok) {
      res.innerHTML = `<span class="ok">✓ 正确！</span> ${dictWord.en} ${dictWord.ph || ''}`;
    } else {
      res.innerHTML = `<span class="ng">✗ 正确拼写是：</span> ${dictWord.en} ${dictWord.ph || ''}<br>你写的是：${inp.value || '（空）'}`;
      addWrongWord(dictWord);
    }
    inp.disabled = true;
    document.getElementById('dictCheckBtn').style.display = 'none';
    document.getElementById('dictNextBtn').style.display = 'inline-block';
    const s = lsGet('aiwords_dict', { c: 0, t: 0 });
    document.getElementById('dictScore').textContent = `默写：对 ${s.c} / 共 ${s.t}`;
    document.getElementById('dictNextBtn').focus();
  }

  // ================= 学习进度统计 =================
  function renderStats() {
    const total = ALL_WORDS.length;
    const seen = [...seenSet].filter(en => ALL_WORDS.some(w => w.en === en)).length;
    const q = lsGet('aiwords_quiz', { c: 0, t: 0 });
    const d = lsGet('aiwords_dict', { c: 0, t: 0 });
    const wrong = getWrong();
    const wrongActive = wrong.filter(x => !x.mastered).length;
    const mastered = wrong.filter(x => x.mastered).length;
    const qAcc = q.t ? Math.round(q.c / q.t * 100) : 0;
    const dAcc = d.t ? Math.round(d.c / d.t * 100) : 0;
    const days = getDays().length;

    const cards = [
      { num: `${seen}`, lbl: `学过的单词 / 共 ${total}` },
      { num: `${days} 天`, lbl: '累计打卡天数' },
      { num: `${qAcc}%`, lbl: `测验正确率（${q.c}/${q.t}）` },
      { num: `${dAcc}%`, lbl: `默写正确率（${d.c}/${d.t}）` },
      { num: `${wrongActive}`, lbl: '错词本待复习' },
      { num: `${mastered}`, lbl: '已掌握错词' }
    ];
    document.getElementById('statsGrid').innerHTML = cards.map(c =>
      `<div class="stat-card"><div class="num">${c.num}</div><div class="lbl">${c.lbl}</div></div>`).join('');

    let html = '<div style="font-weight:600;margin-bottom:8px">各册学习进度</div>';
    BOOKS.forEach(b => {
      const words = ALL_WORDS.filter(w => w.book === b);
      const learned = words.filter(w => seenSet.has(w.en)).length;
      const pct = words.length ? Math.round(learned / words.length * 100) : 0;
      html += `<div class="bookrow"><span class="bl">${BOOK_NAME[b]} ${b}</span>` +
        `<span class="bar"><i style="width:${pct}%"></i></span>` +
        `<span class="bn">${learned}/${words.length}</span></div>`;
    });
    document.getElementById('statsBooks').innerHTML = html;
  }

  // ================= 每日打卡 =================
  function todayStr() { const d = new Date(); return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`; }
  function getDays() { try { return JSON.parse(localStorage.getItem('aiwords_days') || '[]'); } catch { return []; } }
  function checkInToday() {
    const days = getDays(); const t = todayStr();
    if (!days.includes(t)) { days.push(t); localStorage.setItem('aiwords_days', JSON.stringify(days)); }
    renderStreak();
  }
  function renderStreak() {
    const days = getDays().map(s => new Date(s.replace(/-/g,'/'))).sort((a,b)=>a-b);
    document.getElementById('daysNum').textContent = getDays().length;
    let streak = 0;
    let cur = new Date(); cur.setHours(0,0,0,0);
    const set = new Set(getDays().map(s => new Date(s.replace(/-/g,'/')).setHours(0,0,0,0)));
    while (set.has(cur.getTime())) { streak++; cur.setDate(cur.getDate()-1); }
    document.getElementById('streakNum').textContent = streak;
  }

  // ================= 切换 & 初始化 =================
  let selectedUnit = 'all';

  function naturalUnits(book) {
    const us = [...new Set(ALL_WORDS.filter(w => w.book === book).map(w => w.unit))];
    us.sort((a, b) => (parseInt(a, 10) || 0) - (parseInt(b, 10) || 0) || String(a).localeCompare(String(b)));
    return us;
  }
  function fillUnitOptions() {
    const sel = document.getElementById('unitSel');
    sel.innerHTML = '<option value="all">全部单元</option>';
    if (selectedBook === 'all') { sel.disabled = true; return; }
    sel.disabled = false;
    naturalUnits(selectedBook).forEach(u => {
      const o = document.createElement('option');
      o.value = u; o.textContent = /^\d+$/.test(u) ? ('Unit ' + u) : u;
      sel.appendChild(o);
    });
  }
  function applyBookFilter() {
    WORDS = ALL_WORDS.filter(w =>
      (selectedBook === 'all' || w.book === selectedBook) &&
      (selectedUnit === 'all' || w.unit === selectedUnit)
    );
    if (!WORDS.length) WORDS = ALL_WORDS.slice();
    idx = 0; spIdx = 0; currentWord = null;
    renderCard(); renderSpeak();
    if (document.getElementById('panel-dict').classList.contains('active')) newDict();
  }
  function onBookChange() {
    if (playing) stopAutoPlay();
    selectedBook = document.getElementById('bookSel').value;
    selectedUnit = 'all';
    fillUnitOptions();
    applyBookFilter();
    if (document.getElementById('panel-quiz').classList.contains('active')) newQuestion();
  }
  function onUnitChange() {
    if (playing) stopAutoPlay();
    selectedUnit = document.getElementById('unitSel').value;
    applyBookFilter();
    if (document.getElementById('panel-quiz').classList.contains('active')) newQuestion();
  }
  function switchTab(name) {
    if (name !== 'learn' && playing) stopAutoPlay();
    ['learn','quiz','speak','dict','wrong','stats'].forEach(n => {
      document.getElementById('tab-'+n).classList.toggle('active', n === name);
      document.getElementById('panel-'+n).classList.toggle('active', n === name);
    });
    if (name === 'quiz' && !currentWord) newQuestion();
    if (name === 'speak') renderSpeak();
    if (name === 'dict') newDict();
    if (name === 'wrong') renderWrong();
    if (name === 'stats') renderStats();
  }

  document.addEventListener('keydown', (e) => {
    if (document.getElementById('panel-learn').classList.contains('active')) {
      if (e.key === 'ArrowRight') nextWord();
      if (e.key === 'ArrowLeft') prevWord();
      if (e.key === ' ') { e.preventDefault(); flipCard(); }
    }
  });

  score = parseInt(localStorage.getItem('aiwords_score') || '0', 10);
  fillUnitOptions();
  renderCard(); renderSpeak(); updateScore(); renderStreak();
</script>
